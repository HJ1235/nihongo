name: Backend Docker Build & Push

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-docker-ghcr.yml"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/hj1235/nihongo-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.SHORT_SHA }}

      - name: Update Kubernetes image tag
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          deployment = Path("k8s/backend/deployment.yaml")
          image = f"ghcr.io/hj1235/nihongo-backend:{os.environ['SHORT_SHA']}"
          text = deployment.read_text(encoding="utf-8")
          updated = re.sub(
              r"^(\s*image:\s*)ghcr\.io/hj1235/nihongo-backend:\S+",
              lambda match: f"{match.group(1)}{image}",
              text,
              count=1,
              flags=re.MULTILINE,
          )

          if updated == text:
              raise SystemExit("Backend image line was not found in k8s/backend/deployment.yaml")

          deployment.write_text(updated, encoding="utf-8")
          PY

      - name: Commit and push Kubernetes image update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: update backend image to ${SHORT_SHA}"
          git push
