apiVersion: v1
kind: ConfigMap
metadata:
  name: nihongo-backend-config
  labels:
    app: nihongo-backend
data:
  SPRING_PROFILES_ACTIVE: "prod"
  PORT: "8080"
  AI_CORRECTION_PROVIDER: "mock"
  OPENAI_CORRECTION_MODEL: "gpt-5.2"
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173,https://nihongotest.shop"
