apiVersion: v1
kind: ConfigMap
metadata:
  name: nihongo-backend-config
  namespace: nihongo
  labels:
    app: nihongo-backend
data:
  SPRING_PROFILES_ACTIVE: "prod"
  PORT: "8080"
  AI_CORRECTION_PROVIDER: "mock"
  OPENAI_CORRECTION_MODEL: "gpt-5.2"
  OPENAI_BASE_URL: "https://api.openai.com/v1"
  GEMINI_CORRECTION_MODEL: "gemini-2.5-flash"
  GEMINI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta"
  CORS_ALLOWED_ORIGINS: "http://localhost:5173,https://nihongotest.shop,https://www.nihongotest.shop"
